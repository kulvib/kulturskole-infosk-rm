[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://kulturskole-infosk-rm.onrender.com wss://kulturskole-infosk-rm.onrender.com; media-src 'self' https://kulturskole-infosk-rm.onrender.com blob:; worker-src 'self' blob:; frame-ancestors 'none'; object-src 'none'; base-uri 'self';"

[[redirects]]
  from = "/api/*"
  to = "https://kulturskole-infosk-rm.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback (skal være SIDST!)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
