services:

  # ─── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: infoskaerm-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn service1.main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level info"

    healthCheckPath: /health

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        sync: false

      - key: FRONTEND_URL
        sync: false

      # Kræver minimum 32 tegn — generateValue producerer en lang nøgle så
      # denne er kun relevant hvis du overskriver med en manuel værdi.
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: BCRYPT_ROUNDS
        value: "12"

      # Sætter Python til at ikke buffe stdout/stderr —
      # sikrer at logs vises i realtid i Render-dashboardet.
      - key: PYTHONUNBUFFERED
        value: "1"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: static
    name: timetracking-frontend
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: ./dist

    headers:
      # Tillad ikke at siden indlejres i en iframe (clickjacking-beskyttelse)
      - path: /*
        name: X-Frame-Options
        value: DENY
      # Slå MIME-type sniffing fra
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      # Aktiver HTTPS-enforcing i browseren (1 år)
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains"
      # Content Security Policy — begrænser hvorfra ressourcer må indlæses
      # style-src tillader 'unsafe-inline' da MUI/Emotion injicerer inline-styles.
      # connect-src tillader https: så API-kald til backend (*.onrender.com) virker.
      # Opdater connect-src til den specifikke backend-URL for en strammere politik.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
      # Assets med hash i filnavnet kan caches aggressivt
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      # index.html og andre HTML-filer må aldrig caches
      - path: /*.html
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        sync: false
