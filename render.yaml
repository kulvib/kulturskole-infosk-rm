services:

  # ─── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: infoskaerm-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install -r service1/requirements.txt"

    # VIGTIGT for HLS/livestream:
    # Kør 1 worker, fordi livestream health/manifest/timestamp-state ellers kan
    # ramme forskellige worker-processer. Terminal/remote desktop kan stadig virke.
    startCommand: "uvicorn service1.main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info"

    healthCheckPath: /health

    envVars:
      - key: SECRET_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: ADMIN_USERNAME
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: ADMIN_EMAIL
        sync: false

      - key: ALLOWED_ORIGINS
        value: "https://infoskaerm-frontend.onrender.com"

      - key: FRONTEND_URL
        value: "https://infoskaerm-frontend.onrender.com"

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: CLIENTFLOW_ONLINE_TIMEOUT_SECONDS
        value: "30"

      - key: BCRYPT_ROUNDS
        value: "12"

      # Skal matche den mappe som backend monterer som /hls.
      # Hvis du senere bruger Render Disk, så mount disken på samme path.
      - key: HLS_BASE_DIR
        value: "/opt/render/project/src/backend/service1/hls"

      # Sætter Python til ikke at buffe stdout/stderr, så logs vises hurtigt.
      - key: PYTHONUNBUFFERED
        value: "1"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: static
    name: infoskaerm-frontend
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: ./dist

    headers:
      # Tillad ikke at siden indlejres i en iframe (clickjacking-beskyttelse)
      - path: /*
        name: X-Frame-Options
        value: DENY

      # Slå MIME-type sniffing fra
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

      # Aktiver HTTPS-enforcing i browseren (1 år)
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains"

      # Content Security Policy.
      # HLS.js kræver blob: til MediaSource og ofte worker-src blob:.
      # Terminal/remote desktop kræver wss: i connect-src.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; media-src 'self' https: blob:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

      # Assets med hash i filnavnet kan caches aggressivt
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"

      # index.html og andre HTML-filer må aldrig caches
      - path: /*.html
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: "https://kulturskole-infosk-rm.onrender.com"
