autoinstall:
  version: 1

  # Interaktiv Ubuntu-installation. ClientFlow installeres ikke automatisk her,
  # fordi v4 kræver en installationskode/enrollment-code fra admin.
  interactive-sections:
    - "*"

  refresh-installer:
    update: false

  locale: da_DK.UTF-8
  keyboard:
    layout: dk
    variant: ""
  timezone: Europe/Copenhagen

  identity:
    hostname: clientflow-client
    username: clientflow
    password: "$6$Uj0EKNkpUAGkMJPB$WN.HVKieIS07HN4RYtLXLDZoeyOYYpviX9MMPLmB8tZV5J25SThZZmI5p13xr6ixDVnXQYbtorifRDl251J60/"

  apt:
    preserve_sources_list: false
    mirror-selection:
      primary:
        - uri: "http://archive.ubuntu.com/ubuntu"
          arches: [amd64]
    fallback: offline-install
    geoip: false

  late-commands:
    - |
      cat > /target/usr/local/sbin/clientflow-firstboot-setup-icon.sh <<'SH'
      #!/usr/bin/env bash
      set -euo pipefail

      LOG="/var/log/clientflow-firstboot-setup-icon.log"
      exec > >(tee -a "$LOG") 2>&1

      RENDER_BASE_URL="https://autoinstall.onrender.com"
      DONE="/var/lib/clientflow-firstboot-setup-icon.done"

      echo "=== ClientFlow firstboot desktop icon setup ==="
      date -Is

      if [[ -f "$DONE" ]]; then
        echo "Allerede kørt: $DONE"
        exit 0
      fi

      CLIENTFLOW_USER="$(getent passwd | awk -F: '$3 >= 1000 && $3 < 60000 && $1 != "nobody" { print $1; exit }')"
      if [[ -z "${CLIENTFLOW_USER:-}" ]]; then
        echo "FEJL: Kunne ikke finde almindelig Ubuntu-bruger med UID >= 1000."
        exit 1
      fi

      USER_HOME="$(getent passwd "$CLIENTFLOW_USER" | cut -d: -f6)"
      echo "Fundet Ubuntu-bruger: $CLIENTFLOW_USER"

      echo "== Sætter GDM til X11 + autologin for $CLIENTFLOW_USER =="
      mkdir -p /etc/gdm3
      cat > /etc/gdm3/custom.conf <<EOF_GDM
      [daemon]
      WaylandEnable=false
      AutomaticLoginEnable=True
      AutomaticLogin=$CLIENTFLOW_USER
      EOF_GDM

      export DEBIAN_FRONTEND=noninteractive
      apt-get update || true
      apt-get install -y curl unzip ca-certificates || true

      sudo -u "$CLIENTFLOW_USER" -H bash -lc "
        cd '$USER_HOME'
        curl -fL '$RENDER_BASE_URL/setup-clientflow-desktop-icon.sh' -o setup-clientflow-desktop-icon.sh
        chmod +x setup-clientflow-desktop-icon.sh
        bash setup-clientflow-desktop-icon.sh
      "

      mkdir -p /var/lib
      touch "$DONE"
      systemctl disable clientflow-firstboot-setup-icon.service || true

      echo "== ClientFlow skrivebordsikon installeret =="
      echo "Næste: opret installationskode i admin, log ind og åbn 'ClientFlow Installer'."
      date -Is
      SH

      chmod +x /target/usr/local/sbin/clientflow-firstboot-setup-icon.sh

    - |
      cat > /target/etc/systemd/system/clientflow-firstboot-setup-icon.service <<'EOF_SERVICE'
      [Unit]
      Description=ClientFlow first boot desktop icon setup
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/clientflow-firstboot-setup-icon.sh
      RemainAfterExit=yes
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
      EOF_SERVICE

    - curtin in-target --target=/target -- systemctl enable clientflow-firstboot-setup-icon.service
